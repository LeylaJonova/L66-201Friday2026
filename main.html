<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #001122, #000666);
      font-family: Orbitron;
      color: white;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 32px;
      text-shadow: 0 0 10px lightcyan;
      text-align: center;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .cell {
      width: 160px;
      height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 20px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .cell:hover {
      transform: translateY(-8px) scale(1.05);
    }

    .game1:hover { box-shadow: 0 0 25px #22c55e; border: 2px solid #22c55e; }
    .game2:hover { box-shadow: 0 0 25px #3b82f6; border: 2px solid #3b82f6; }
    .game3:hover { box-shadow: 0 0 25px #a855f7; border: 2px solid #a855f7; }
    .game4:hover { box-shadow: 0 0 25px #f43f5e; border: 2px solid #f43f5e; }
    .game5:hover { box-shadow: 0 0 25px #f97316; border: 2px solid #f97316; }
    .game6:hover { box-shadow: 0 0 25px #eab308; border: 2px solid #eab308; }
    .game7:hover { box-shadow: 0 0 25px #14b8a6; border: 2px solid #14b8a6; }
    .game8:hover { box-shadow: 0 0 25px #6366f1; border: 2px solid #6366f1; }
    .game9:hover { box-shadow: 0 0 25px #ec4899; border: 2px solid #ec4899; }

    .game1 { background-color: rgba(34, 197, 94, 0.7);}
    .game2 { background-color: rgba(59, 130, 246, 0.7);}
    .game3 { background-color: rgba(168, 85, 247, 0.7);}
    .game4 { background-color: rgba(244, 63, 94, 0.7);}
    .game5 { background-color: rgba(249, 115, 22, 0.7);}
    .game6 { background-color: rgba(234, 179, 8, 0.7);}
    .game7 { background-color: rgba(20, 184, 166, 0.7);}
    .game8 { background-color: rgba(99, 102, 241, 0.7);}
    .game9 { background-color: rgba(236, 72, 153, 0.7);}


    .cell span.small {
      display: block;
      font-size: 12px;
      opacity: 0.5;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>Ігри групи<br>L66-201Friday2026</h1>

<div class="menu">
  <div class="row">
    <a class="cell game1" href="#"><div>Game 1<span class="small">arcade</span></div></a>
    <a class="cell game2" href="#"><div>Game 2<span class="small">logic</span></div></a>
    <a class="cell game3" href="#"><div>Game 3<span class="small">action</span></div></a>
  </div>

  <div class="row">
    <a class="cell game4" href="#"><div>Game 4<span class="small">puzzle</span></div></a>
    <a class="cell game5" href="#"><div>Game 5<span class="small">fun</span></div></a>
    <a class="cell game6" href="#"><div>Game 6<span class="small">retro</span></div></a>
  </div>

  <div class="row">
    <a class="cell game7" href="#"><div>Game 7<span class="small">fast</span></div></a>
    <a class="cell game8" href="#"><div>Game 8<span class="small">skill</span></div></a>
    <a class="cell game9" href="#"><div>Game 9<span class="small">random</span></div></a>
  </div>
</div>

</body>
</html>
